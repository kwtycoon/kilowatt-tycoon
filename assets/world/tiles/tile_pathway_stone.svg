<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="stone_pattern" patternUnits="userSpaceOnUse" width="32" height="32">
      <rect width="32" height="32" fill="#9BA3AF"/>
      <ellipse cx="8" cy="8" rx="6" ry="7" fill="#CBD2D9" opacity="0.4"/>
      <ellipse cx="24" cy="8" rx="5" ry="6" fill="#6B7280" opacity="0.3"/>
      <ellipse cx="8" cy="24" rx="6" ry="6" fill="#6B7280" opacity="0.3"/>
      <ellipse cx="24" cy="24" rx="7" ry="7" fill="#CBD2D9" opacity="0.4"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="url(#stone_pattern)"/>
  <ellipse cx="32" cy="16" rx="2" ry="1.5" fill="#5D7F4A" opacity="0.3"/>
  <ellipse cx="16" cy="48" rx="2" ry="1.5" fill="#5D7F4A" opacity="0.3"/>
</svg>
