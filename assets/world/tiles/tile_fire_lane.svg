<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#3A3F4B"/>
  <rect x="0" y="0" width="64" height="64" fill="#DC2626" opacity="0.25"/>
  <line x1="-32" y1="0" x2="32" y2="64" stroke="#DC2626" stroke-width="4" opacity="0.4"/>
  <line x1="-16" y1="0" x2="48" y2="64" stroke="#DC2626" stroke-width="4" opacity="0.4"/>
  <line x1="0" y1="0" x2="64" y2="64" stroke="#DC2626" stroke-width="4" opacity="0.4"/>
  <line x1="16" y1="0" x2="80" y2="64" stroke="#DC2626" stroke-width="4" opacity="0.4"/>
  <line x1="32" y1="0" x2="96" y2="64" stroke="#DC2626" stroke-width="4" opacity="0.4"/>
  <line x1="48" y1="0" x2="112" y2="64" stroke="#DC2626" stroke-width="4" opacity="0.4"/>
  <line x1="64" y1="0" x2="128" y2="64" stroke="#DC2626" stroke-width="4" opacity="0.4"/>
  <line x1="80" y1="0" x2="144" y2="64" stroke="#DC2626" stroke-width="4" opacity="0.4"/>
  <text x="32" y="36" font-family="Arial" font-size="8" font-weight="bold" fill="#FFFFFF" text-anchor="middle" opacity="0.7">FIRE</text>
</svg>
