<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="glass_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B8D4E8;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#B8D4E8;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="storefront_frame_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2B6BC0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E4D8C;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="8" fill="#1E4D8C"/>
  <rect x="0" y="8" width="64" height="56" fill="#E0DCD6"/>
  <rect x="0" y="58" width="64" height="6" fill="#1E4D8C"/>
  <rect x="4" y="10" width="56" height="46" fill="url(#storefront_frame_grad)"/>
  <rect x="6" y="12" width="52" height="42" fill="url(#glass_grad)"/>
  <rect x="30" y="12" width="4" height="42" fill="#1E4D8C"/>
  <rect x="8" y="38" width="20" height="4" fill="#2E323A" opacity="0.2"/>
  <rect x="36" y="38" width="20" height="4" fill="#2E323A" opacity="0.2"/>
  <path d="M 8 16 L 22 16 L 12 32 Z" fill="#FFFFFF" opacity="0.12"/>
  <path d="M 38 16 L 50 16 L 42 30 Z" fill="#FFFFFF" opacity="0.1"/>
</svg>
