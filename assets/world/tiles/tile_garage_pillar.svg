<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="pillar_grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E0DCD6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E0DCD6;stop-opacity:1"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#3D4451"/>
  <rect x="16" y="16" width="32" height="32" rx="4" fill="url(#pillar_grad)" filter="url(#shadow)"/>
  <rect x="17" y="17" width="30" height="2" rx="1" fill="#F0EDE8" opacity="0.4"/>
</svg>
