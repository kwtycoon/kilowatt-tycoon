<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#3A3F4B"/>
  <rect x="0" y="24" width="64" height="16" fill="#2E323A" opacity="0.6"/>
  <rect x="4" y="26" width="4" height="12" fill="#000000" opacity="0.5"/>
  <rect x="12" y="26" width="4" height="12" fill="#000000" opacity="0.5"/>
  <rect x="20" y="26" width="4" height="12" fill="#000000" opacity="0.5"/>
  <rect x="28" y="26" width="4" height="12" fill="#000000" opacity="0.5"/>
  <rect x="36" y="26" width="4" height="12" fill="#000000" opacity="0.5"/>
  <rect x="44" y="26" width="4" height="12" fill="#000000" opacity="0.5"/>
  <rect x="52" y="26" width="4" height="12" fill="#000000" opacity="0.5"/>
  <rect x="60" y="26" width="4" height="12" fill="#000000" opacity="0.5"/>
</svg>
