<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="-8.0 -20.0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="stanchion_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F9A825;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <ellipse cx="12" cy="22" rx="8" ry="2" fill="#000000" opacity="0.12"/>
  <ellipse cx="36" cy="22" rx="8" ry="2" fill="#000000" opacity="0.12"/>
  <rect x="10" y="8" width="4" height="14" rx="1" fill="url(#stanchion_grad)" filter="url(#shadow)"/>
  <circle cx="12" cy="8" r="4" fill="#FFC107"/>
  <rect x="34" y="8" width="4" height="14" rx="1" fill="url(#stanchion_grad)" filter="url(#shadow)"/>
  <circle cx="36" cy="8" r="4" fill="#FFC107"/>
  <path d="M14 8 Q24 10 34 8" stroke="#D32F2F" stroke-width="2" fill="none"/>
</svg>
