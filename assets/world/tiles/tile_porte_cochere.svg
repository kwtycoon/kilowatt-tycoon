<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="porte_floor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8DCC7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D4C5B0;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="url(#porte_floor)"/>
  <line x1="32" y1="0" x2="32" y2="64" stroke="#C4C0BA" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="32" x2="64" y2="32" stroke="#C4C0BA" stroke-width="0.5" opacity="0.2"/>
  <rect x="4" y="4" width="24" height="24" rx="2" fill="#FFFFFF" opacity="0.05"/>
</svg>
