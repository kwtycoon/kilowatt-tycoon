<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="asphalt_noise" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#3A3F4B"/>
      <circle cx="1" cy="2" r="0.8" fill="#2E323A" opacity="0.4"/>
      <circle cx="5" cy="1" r="0.6" fill="#4A5160" opacity="0.3"/>
      <circle cx="3" cy="5" r="0.7" fill="#2E323A" opacity="0.3"/>
      <circle cx="7" cy="6" r="0.5" fill="#4A5160" opacity="0.2"/>
      <circle cx="2" cy="7" r="0.6" fill="#2E323A" opacity="0.35"/>
      <circle cx="6" cy="3" r="0.4" fill="#4A5160" opacity="0.25"/>
    </pattern>
    <linearGradient id="asphalt_sheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A5160;stop-opacity:0.1"/>
      <stop offset="50%" style="stop-color:#3A3F4B;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#2E323A;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#3A3F4B"/>
  <rect x="0" y="0" width="64" height="64" fill="url(#asphalt_noise)"/>
  <rect x="0" y="0" width="64" height="64" fill="url(#asphalt_sheen)"/>
  <circle cx="12" cy="18" r="1.5" fill="#2E323A"/>
  <circle cx="45" cy="8" r="1.2" fill="#4A5160"/>
  <circle cx="28" cy="42" r="1.3" fill="#2E323A"/>
  <circle cx="55" cy="35" r="1.0" fill="#4A5160"/>
  <circle cx="8" cy="52" r="1.4" fill="#2E323A"/>
  <circle cx="38" cy="58" r="1.1" fill="#4A5160"/>
</svg>
