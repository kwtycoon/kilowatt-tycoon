<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="-20.0 -20.0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="trash_lid" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#D1D5DB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4B5563;stop-opacity:1"/>
    </radialGradient>
  </defs>
  <ellipse cx="13" cy="20" rx="9" ry="3" fill="#000000" opacity="0.12"/>
