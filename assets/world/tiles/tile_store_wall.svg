<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="wall_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E4D8C;stop-opacity:1"/>
      <stop offset="12%" style="stop-color:#1E4D8C;stop-opacity:1"/>
      <stop offset="12%" style="stop-color:#F0EDE8;stop-opacity:1"/>
      <stop offset="90%" style="stop-color:#E0DCD6;stop-opacity:1"/>
      <stop offset="90%" style="stop-color:#1E4D8C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E4D8C;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="url(#wall_grad)"/>
  <line x1="16" y1="8" x2="16" y2="58" stroke="#C4C0BA" stroke-width="1" opacity="0.3"/>
  <line x1="32" y1="8" x2="32" y2="58" stroke="#C4C0BA" stroke-width="1" opacity="0.3"/>
  <line x1="48" y1="8" x2="48" y2="58" stroke="#C4C0BA" stroke-width="1" opacity="0.3"/>
  <rect x="8" y="2" width="48" height="5" rx="1" fill="#2B6BC0" opacity="0.3"/>
</svg>
