<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#3A3F4B"/>
  <rect x="4" y="0" width="10" height="64" fill="#FFFFFF" opacity="0.9"/>
  <rect x="6" y="28" width="6" height="2" fill="#3A3F4B" opacity="0.2"/>
  <rect x="18" y="0" width="10" height="64" fill="#FFFFFF" opacity="0.9"/>
  <rect x="20" y="28" width="6" height="2" fill="#3A3F4B" opacity="0.2"/>
  <rect x="32" y="0" width="10" height="64" fill="#FFFFFF" opacity="0.9"/>
  <rect x="34" y="28" width="6" height="2" fill="#3A3F4B" opacity="0.2"/>
  <rect x="46" y="0" width="10" height="64" fill="#FFFFFF" opacity="0.9"/>
  <rect x="48" y="28" width="6" height="2" fill="#3A3F4B" opacity="0.2"/>
</svg>
