<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="canopy_grid" patternUnits="userSpaceOnUse" width="32" height="32">
      <rect width="32" height="32" fill="#F0EDE8"/>
      <line x1="0" y1="0" x2="32" y2="0" stroke="#E0DCD6" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="32" stroke="#E0DCD6" stroke-width="1"/>
    </pattern>
    <linearGradient id="canopy_red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E63950;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#C41E3A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8B1A2C;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="canopy_glow_edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF4B3;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#FFE066;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFE066;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="url(#canopy_red)"/>
  <line x1="0" y1="8" x2="64" y2="8" stroke="#8B1A2C" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="16" x2="64" y2="16" stroke="#8B1A2C" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="24" x2="64" y2="24" stroke="#8B1A2C" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="32" x2="64" y2="32" stroke="#8B1A2C" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="40" x2="64" y2="40" stroke="#8B1A2C" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="48" x2="64" y2="48" stroke="#8B1A2C" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="56" x2="64" y2="56" stroke="#8B1A2C" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="64" x2="64" y2="64" stroke="#8B1A2C" stroke-width="1" opacity="0.5"/>
  <rect x="0" y="56" width="64" height="8" fill="url(#canopy_glow_edge)"/>
  <rect x="0" y="58" width="64" height="2" fill="#FFF4B3" opacity="0.8"/>
  <rect x="12" y="20" width="40" height="2" rx="1" fill="#FFE066" opacity="0.3"/>
  <rect x="12" y="42" width="40" height="2" rx="1" fill="#FFE066" opacity="0.3"/>
</svg>
