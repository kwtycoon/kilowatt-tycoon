<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#3A3F4B"/>
  <rect x="0" y="0" width="64" height="64" fill="#8B5CF6" opacity="0.15"/>
  <rect x="28" y="12" width="8" height="8" fill="#FFFFFF" opacity="0.8"/>
  <rect x="28" y="26" width="8" height="8" fill="#FFFFFF" opacity="0.8"/>
  <rect x="28" y="40" width="8" height="8" fill="#FFFFFF" opacity="0.8"/>
  <rect x="28" y="54" width="8" height="8" fill="#FFFFFF" opacity="0.8"/>
</svg>
