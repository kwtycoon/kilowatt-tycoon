<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="concrete_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0EDE8;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#E0DCD6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E0DCD6;stop-opacity:1"/>
    </linearGradient>
    <pattern id="concrete_speckle" patternUnits="userSpaceOnUse" width="12" height="12">
      <rect width="12" height="12" fill="transparent"/>
      <circle cx="2" cy="3" r="0.5" fill="#C4C0BA" opacity="0.3"/>
      <circle cx="8" cy="2" r="0.4" fill="#F0EDE8" opacity="0.4"/>
      <circle cx="5" cy="8" r="0.6" fill="#C4C0BA" opacity="0.25"/>
      <circle cx="10" cy="10" r="0.3" fill="#F0EDE8" opacity="0.35"/>
      <circle cx="1" cy="11" r="0.4" fill="#C4C0BA" opacity="0.2"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="url(#concrete_grad)"/>
  <rect x="0" y="0" width="64" height="64" fill="url(#concrete_speckle)"/>
  <rect x="31" y="0" width="2" height="64" fill="#C4C0BA" opacity="0.4"/>
  <rect x="32" y="0" width="1" height="64" fill="#F0EDE8" opacity="0.2"/>
  <rect x="0" y="31" width="64" height="2" fill="#C4C0BA" opacity="0.4"/>
  <rect x="0" y="32" width="64" height="1" fill="#F0EDE8" opacity="0.2"/>
  <ellipse cx="15" cy="45" rx="4" ry="2" fill="#C4C0BA" opacity="0.1"/>
  <ellipse cx="50" cy="18" rx="3" ry="2" fill="#C4C0BA" opacity="0.08"/>
</svg>
