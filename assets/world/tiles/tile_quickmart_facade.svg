<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0.0 -32.0 128.0 128.0">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="quickmart_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2B6BC0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E4D8C;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="quickmart_text_glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E0E0E0;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <ellipse cx="64" cy="60" rx="56" ry="4" fill="#000000" opacity="0.12"/>
  <rect x="4" y="4" width="120" height="48" rx="6" fill="#1E4D8C" filter="url(#shadow)"/>
  <rect x="6" y="6" width="116" height="44" rx="5" fill="url(#quickmart_bg)"/>
  <rect x="8" y="8" width="112" height="40" rx="4" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  <text x="40" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="url(#quickmart_text_glow)" text-anchor="middle">QUICK</text>
  <text x="92" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFE066" text-anchor="middle">MART</text>
  <text x="64" y="42" font-family="Arial, sans-serif" font-size="6" fill="#FFFFFF" text-anchor="middle" opacity="0.7">FUEL • FOOD • EV CHARGING</text>
  <rect x="20" y="52" width="8" height="8" rx="1" fill="#71717A"/>
  <rect x="100" y="52" width="8" height="8" rx="1" fill="#71717A"/>
</svg>
