<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#E0DCD6"/>
  <rect x="8" y="8" width="20" height="20" rx="1" fill="#B8D4E8" opacity="0.5"/>
  <rect x="8" y="8" width="20" height="20" rx="1" fill="none" stroke="#3F3F46" stroke-width="1"/>
  <line x1="18" y1="8" x2="18" y2="28" stroke="#3F3F46" stroke-width="0.5"/>
  <line x1="8" y1="18" x2="28" y2="18" stroke="#3F3F46" stroke-width="0.5"/>
  <rect x="32" y="8" width="20" height="20" rx="1" fill="#B8D4E8" opacity="0.5"/>
  <rect x="32" y="8" width="20" height="20" rx="1" fill="none" stroke="#3F3F46" stroke-width="1"/>
  <line x1="42" y1="8" x2="42" y2="28" stroke="#3F3F46" stroke-width="0.5"/>
  <line x1="32" y1="18" x2="52" y2="18" stroke="#3F3F46" stroke-width="0.5"/>
  <rect x="8" y="32" width="20" height="20" rx="1" fill="#B8D4E8" opacity="0.5"/>
  <rect x="8" y="32" width="20" height="20" rx="1" fill="none" stroke="#3F3F46" stroke-width="1"/>
  <line x1="18" y1="32" x2="18" y2="52" stroke="#3F3F46" stroke-width="0.5"/>
  <line x1="8" y1="42" x2="28" y2="42" stroke="#3F3F46" stroke-width="0.5"/>
  <rect x="32" y="32" width="20" height="20" rx="1" fill="#B8D4E8" opacity="0.5"/>
  <rect x="32" y="32" width="20" height="20" rx="1" fill="none" stroke="#3F3F46" stroke-width="1"/>
  <line x1="42" y1="32" x2="42" y2="52" stroke="#3F3F46" stroke-width="0.5"/>
  <line x1="32" y1="42" x2="52" y2="42" stroke="#3F3F46" stroke-width="0.5"/>
</svg>
