<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="brick_pattern" patternUnits="userSpaceOnUse" width="16" height="8">
      <rect width="16" height="8" fill="#8B5A3C"/>
      <rect x="0" y="0" width="7" height="3" fill="#A67C5D" opacity="0.3"/>
      <rect x="8" y="0" width="7" height="3" fill="#6B4532" opacity="0.2"/>
      <rect x="0" y="4" width="15" height="3" fill="#6B4532" opacity="0.15"/>
      <line x1="0" y1="4" x2="16" y2="4" stroke="#6B4532" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#8B5A3C"/>
  <rect x="0" y="0" width="64" height="64" fill="url(#brick_pattern)"/>
</svg>
