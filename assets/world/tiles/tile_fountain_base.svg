<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="water_grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7DD3FC;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0284C7;stop-opacity:0.8"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#9BA3AF"/>
  <circle cx="32" cy="32" r="24" fill="url(#water_grad)"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.3"/>
  <circle cx="32" cy="32" r="16" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.2"/>
</svg>
