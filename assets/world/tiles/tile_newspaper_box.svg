<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="-24.0 -20.0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <ellipse cx="8" cy="22" rx="7" ry="2" fill="#000000" opacity="0.15"/>
  <rect x="2" y="4" width="12" height="18" rx="2" fill="#52525B" filter="url(#shadow)"/>
  <rect x="3" y="5" width="10" height="16" rx="1" fill="#71717A"/>
  <rect x="5" y="8" width="6" height="8" rx="1" fill="#B8D4E8" filter="url(#shadow)"/>
  <rect x="6" y="18" width="4" height="1" fill="#52525B"/>
</svg>
