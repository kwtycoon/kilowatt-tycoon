      </feMerge>
    </filter>
    <radialGradient id="gas_icon_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#FF6B35;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#FF9F6B;stop-opacity:0.3"/>
    </radialGradient>
    <radialGradient id="gas_icon_inner" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="20" r="22" fill="#FF9F6B" opacity="0.3"/>
