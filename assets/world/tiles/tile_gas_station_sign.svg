  <circle cx="32" cy="20" r="16" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  <rect x="26" y="12" width="8" height="14" rx="1" fill="#FFFFFF" opacity="0.9"/>
