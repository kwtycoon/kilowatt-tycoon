  <path d="M34 16 Q38 16 38 20 L38 24 L36 24 L36 20 Q36 18 34 18" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.9"/>
  <circle cx="32" cy="20" r="16" fill="url(#gas_icon_inner)"/>
