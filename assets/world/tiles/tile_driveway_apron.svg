<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="apron_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3A3F4B;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#4A5160;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3A3F4B;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="url(#apron_grad)"/>
  <rect x="0" y="28" width="64" height="2" fill="#4A5160" opacity="0.2"/>
  <rect x="0" y="34" width="64" height="2" fill="#2E323A" opacity="0.2"/>
</svg>
