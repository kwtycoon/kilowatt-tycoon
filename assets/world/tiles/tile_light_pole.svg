<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="-16.0 -16.0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="light_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#FFF9C4;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#FFF9C4;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="pole_top" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#D1D5DB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4B5563;stop-opacity:1"/>
    </radialGradient>
  </defs>
  <circle cx="16" cy="16" r="14" fill="url(#light_glow)"/>
  <ellipse cx="18" cy="18" rx="5" ry="3" fill="#000000" opacity="0.15"/>
  <circle cx="16" cy="16" r="8" fill="#4B5563" filter="url(#shadow)"/>
  <circle cx="16" cy="16" r="7" fill="url(#pole_top)"/>
  <circle cx="16" cy="16" r="5" fill="none" stroke="#6B7280" stroke-width="2"/>
  <circle cx="16" cy="16" r="4" fill="#4B5563"/>
  <circle cx="16" cy="16" r="3" fill="#6B7280"/>
  <circle cx="16" cy="16" r="2" fill="#FFFFFF"/>
  <circle cx="15" cy="15" r="0.8" fill="#FFFFFF" opacity="0.8"/>
  <line x1="13" y1="13" x2="10" y2="10" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="19" y1="13" x2="22" y2="10" stroke="#6B7280" stroke-width="1.5"/>
</svg>
