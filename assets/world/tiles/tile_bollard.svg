<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="-24.0 -24.0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bollard_top" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#FFD54F;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F9A825;stop-opacity:1"/>
    </radialGradient>
  </defs>
  <ellipse cx="8" cy="13" rx="6" ry="2" fill="#000000" opacity="0.15"/>
  <circle cx="8" cy="8" r="7" fill="#F9A825" filter="url(#shadow)"/>
  <circle cx="8" cy="8" r="6" fill="url(#bollard_top)"/>
  <circle cx="8" cy="8" r="4" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
  <circle cx="8" cy="8" r="2" fill="#FFD54F"/>
  <circle cx="7" cy="7" r="1" fill="#FFFFFF" opacity="0.6"/>
</svg>
