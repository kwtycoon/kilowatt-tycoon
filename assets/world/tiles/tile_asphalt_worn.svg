<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="asphalt_worn_noise" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#3A3F4B"/>
      <circle cx="1" cy="2" r="0.8" fill="#2E323A" opacity="0.4"/>
      <circle cx="5" cy="1" r="0.6" fill="#4A5160" opacity="0.3"/>
      <circle cx="3" cy="5" r="0.7" fill="#2E323A" opacity="0.3"/>
      <circle cx="7" cy="6" r="0.5" fill="#4A5160" opacity="0.2"/>
    </pattern>
    <linearGradient id="tire_mark_fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2A2E36;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#2A2E36;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#2A2E36;stop-opacity:0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#3A3F4B"/>
  <rect x="0" y="0" width="64" height="64" fill="url(#asphalt_worn_noise)"/>
  <rect x="8" y="0" width="10" height="64" fill="url(#tire_mark_fade)"/>
  <rect x="46" y="0" width="10" height="64" fill="url(#tire_mark_fade)"/>
  <ellipse cx="13" cy="20" rx="3" ry="8" fill="#252830" opacity="0.3"/>
  <ellipse cx="51" cy="45" rx="3" ry="10" fill="#252830" opacity="0.25"/>
  <ellipse cx="32" cy="32" rx="6" ry="4" fill="#2E323A" opacity="0.35"/>
  <circle cx="25" cy="12" r="1.2" fill="#2E323A"/>
  <circle cx="40" cy="55" r="1.0" fill="#4A5160"/>
</svg>
