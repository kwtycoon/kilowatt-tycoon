<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#3A3F4B"/>
  <rect x="0" y="0" width="64" height="64" fill="#F59E0B" opacity="0.2"/>
  <rect x="0" y="28" width="12" height="4" fill="#F5C542" opacity="0.8"/>
  <rect x="0" y="32" width="12" height="4" fill="#F5C542" opacity="0.8"/>
  <rect x="16" y="28" width="12" height="4" fill="#F5C542" opacity="0.8"/>
  <rect x="16" y="32" width="12" height="4" fill="#F5C542" opacity="0.8"/>
