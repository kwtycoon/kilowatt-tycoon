<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#3A3F4B"/>
  <rect x="0" y="24" width="64" height="16" fill="#E0DCD6" opacity="0.7"/>
  <line x1="0" y1="26" x2="64" y2="26" stroke="#C4C0BA" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="38" x2="64" y2="38" stroke="#C4C0BA" stroke-width="1" opacity="0.5"/>
  <line x1="16" y1="24" x2="16" y2="40" stroke="#C4C0BA" stroke-width="0.5" opacity="0.4"/>
  <line x1="32" y1="24" x2="32" y2="40" stroke="#C4C0BA" stroke-width="0.5" opacity="0.4"/>
  <line x1="48" y1="24" x2="48" y2="40" stroke="#C4C0BA" stroke-width="0.5" opacity="0.4"/>
</svg>
