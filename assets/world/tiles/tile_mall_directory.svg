<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="-16.0 -8.0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="kiosk_screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B8D4E8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3F3F46;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="40" width="12" height="8" rx="2" fill="#52525B" filter="url(#shadow)"/>
  <rect x="4" y="4" width="24" height="36" rx="3" fill="#3F3F46" filter="url(#shadow)"/>
  <rect x="6" y="6" width="20" height="32" rx="2" fill="url(#kiosk_screen)"/>
  <rect x="10" y="12" width="12" height="20" rx="1" fill="#2196F3" opacity="0.3"/>
  <circle cx="16" cy="22" r="3" fill="#F44336" opacity="0.7"/>
</svg>
