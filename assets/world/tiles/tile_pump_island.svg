<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#F0EDE8"/>
  <rect x="0" y="0" width="64" height="2" fill="#E0DCD6" opacity="0.8"/>
  <rect x="0" y="62" width="64" height="2" fill="#C4C0BA" opacity="0.6"/>
  <rect x="0" y="0" width="2" height="64" fill="#E0DCD6" opacity="0.8"/>
  <rect x="62" y="0" width="2" height="64" fill="#C4C0BA" opacity="0.6"/>
  <rect x="4" y="4" width="56" height="4" rx="2" fill="#FFC107" opacity="0.8"/>
  <rect x="4" y="56" width="56" height="4" rx="2" fill="#FFC107" opacity="0.8"/>
  <circle cx="20" cy="20" r="0.8" fill="#C4C0BA" opacity="0.2"/>
  <circle cx="44" cy="44" r="0.8" fill="#C4C0BA" opacity="0.2"/>
</svg>
