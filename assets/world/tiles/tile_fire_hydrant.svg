<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="-24.0 -20.0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="hydrant_grad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#E57373;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D32F2F;stop-opacity:1"/>
    </radialGradient>
  </defs>
  <ellipse cx="8" cy="22" rx="6" ry="2" fill="#000000" opacity="0.15"/>
  <rect x="4" y="8" width="8" height="14" rx="1" fill="url(#hydrant_grad)" filter="url(#shadow)"/>
  <rect x="3" y="6" width="10" height="4" rx="1" fill="#F44336"/>
  <rect x="0" y="12" width="4" height="4" rx="1" fill="#D32F2F"/>
  <rect x="12" y="12" width="4" height="4" rx="1" fill="#D32F2F"/>
  <circle cx="8" cy="10" r="1" fill="#FFC107"/>
</svg>
