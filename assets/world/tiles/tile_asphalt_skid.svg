<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="asphalt_skid_noise" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#3A3F4B"/>
      <circle cx="2" cy="3" r="0.6" fill="#2E323A" opacity="0.35"/>
      <circle cx="6" cy="5" r="0.5" fill="#4A5160" opacity="0.25"/>
    </pattern>
    <linearGradient id="skid_mark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#252830;stop-opacity:0.3"/>
      <stop offset="30%" style="stop-color:#252830;stop-opacity:0.9"/>
      <stop offset="70%" style="stop-color:#252830;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#252830;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#3A3F4B"/>
  <rect x="0" y="0" width="64" height="64" fill="url(#asphalt_skid_noise)"/>
  <path d="M 0 20 Q 20 22 40 35 Q 50 42 64 48" stroke="url(#skid_mark)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M 0 32 Q 18 34 38 45 Q 48 50 64 55" stroke="#2A2E36" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.5"/>
  <circle cx="25" cy="28" r="2" fill="#252830" opacity="0.6"/>
  <circle cx="45" cy="40" r="1.5" fill="#252830" opacity="0.5"/>
  <circle cx="55" cy="50" r="1" fill="#252830" opacity="0.4"/>
</svg>
