<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="-16.0 -24.0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="28" height="12" rx="2" fill="#388E3C" filter="url(#shadow)"/>
  <rect x="3" y="3" width="26" height="10" rx="1" fill="#4CAF50"/>
  <path d="M10 8 L20 8 L20 5 L26 8 L20 11 L20 8" fill="#FFFFFF"/>
</svg>
