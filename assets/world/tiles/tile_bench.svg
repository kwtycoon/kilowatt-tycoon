<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="-8.0 -20.0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bench_wood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5A3C;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#A67C5D;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8B5A3C;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <ellipse cx="24" cy="22" rx="20" ry="2" fill="#000000" opacity="0.12"/>
  <rect x="4" y="8" width="40" height="8" rx="2" fill="url(#bench_wood)" filter="url(#shadow)"/>
  <rect x="8" y="16" width="4" height="8" rx="1" fill="#52525B"/>
  <rect x="36" y="16" width="4" height="8" rx="1" fill="#52525B"/>
  <line x1="8" y1="10" x2="8" y2="14" stroke="#8B5A3C" stroke-width="0.5" opacity="0.4"/>
  <line x1="20" y1="10" x2="20" y2="14" stroke="#8B5A3C" stroke-width="0.5" opacity="0.4"/>
  <line x1="32" y1="10" x2="32" y2="14" stroke="#8B5A3C" stroke-width="0.5" opacity="0.4"/>
</svg>
