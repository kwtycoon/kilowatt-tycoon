<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="-8.0 -26.0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="wheelstop_top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0EDE8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E0DCD6;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect x="4" y="8" width="40" height="4" rx="1" fill="#000000" opacity="0.1"/>
  <rect x="2" y="1" width="44" height="9" rx="2" fill="#E0DCD6" filter="url(#shadow)"/>
  <rect x="3" y="1" width="42" height="8" rx="2" fill="url(#wheelstop_top)"/>
  <rect x="5" y="2" width="38" height="1" rx="0.5" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="10" cy="5" r="2" fill="#E0DCD6"/>
  <circle cx="24" cy="5" r="2" fill="#E0DCD6"/>
  <circle cx="38" cy="5" r="2" fill="#E0DCD6"/>
  <line x1="8" y1="7" x2="14" y2="7" stroke="#E0DCD6" stroke-width="0.5" opacity="0.5"/>
  <line x1="30" y1="6" x2="36" y2="6" stroke="#E0DCD6" stroke-width="0.5" opacity="0.5"/>
</svg>
