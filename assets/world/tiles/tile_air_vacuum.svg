<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="-16.0 -16.0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="air_body" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#64B5F6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1"/>
    </radialGradient>
  </defs>
  <ellipse cx="16" cy="28" rx="12" ry="3" fill="#000000" opacity="0.15"/>
  <rect x="6" y="6" width="20" height="20" rx="4" fill="#1976D2" filter="url(#shadow)"/>
  <rect x="8" y="6" width="16" height="18" rx="3" fill="url(#air_body)"/>
  <circle cx="16" cy="14" r="4" fill="#1F2937"/>
  <circle cx="16" cy="14" r="3" fill="none" stroke="#64B5F6" stroke-width="1"/>
  <rect x="14" y="24" width="4" height="4" rx="1" fill="#4B5563"/>
</svg>
