<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="-16.0 0.0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="pump_body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9CA3AF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6B7280;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <ellipse cx="16" cy="60" rx="12" ry="3" fill="#000000" opacity="0.15"/>
  <rect x="6" y="8" width="20" height="48" rx="4" fill="#4B5563" filter="url(#shadow)"/>
  <rect x="8" y="8" width="16" height="46" rx="3" fill="url(#pump_body)"/>
  <rect x="10" y="14" width="12" height="12" rx="2" fill="#1F2937" filter="url(#shadow)"/>
  <rect x="8" y="32" width="16" height="16" rx="2" fill="#4B5563" filter="url(#shadow)"/>
  <line x1="10" y1="38" x2="22" y2="44" stroke="#F44336" stroke-width="2"/>
  <line x1="22" y1="38" x2="10" y2="44" stroke="#F44336" stroke-width="2"/>
</svg>
