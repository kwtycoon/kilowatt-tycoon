<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="curb_bevel2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.35"/>
      <stop offset="30%" style="stop-color:#E8E4DC;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#E8E4DC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.25"/>
    </linearGradient>
    <pattern id="asphalt_curb2" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#3A3F4B"/>
      <circle cx="3" cy="2" r="0.5" fill="#2E323A" opacity="0.3"/>
      <circle cx="7" cy="5" r="0.6" fill="#4A5160" opacity="0.2"/>
    </pattern>
    <pattern id="grass_curb" patternUnits="userSpaceOnUse" width="12" height="12">
      <rect width="12" height="12" fill="#5D7F4A"/>
      <path d="M1 12 Q1.5 9 2 5" stroke="#4A6639" stroke-width="1.2" fill="none" opacity="0.5"/>
      <path d="M4 12 Q3.5 8 5 4" stroke="#7BA668" stroke-width="0.8" fill="none" opacity="0.55"/>
      <path d="M7 12 Q7.5 10 6.5 6" stroke="#4F6B3D" stroke-width="1" fill="none" opacity="0.45"/>
      <path d="M10 12 Q9 7 11 3" stroke="#8DB474" stroke-width="0.9" fill="none" opacity="0.5"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="64" height="30" fill="#3A3F4B"/>
  <rect x="0" y="0" width="64" height="30" fill="url(#asphalt_curb2)"/>
  <rect x="0" y="34" width="64" height="30" fill="#5D7F4A"/>
  <ellipse cx="20" cy="50" rx="12" ry="8" fill="#7BA668" opacity="0.2"/>
  <ellipse cx="50" cy="55" rx="10" ry="6" fill="#8DB474" opacity="0.18"/>
  <rect x="0" y="34" width="64" height="30" fill="url(#grass_curb)"/>
  <ellipse cx="10" cy="37" rx="4" ry="2" fill="#4A6639" opacity="0.45"/>
  <ellipse cx="28" cy="38" rx="3" ry="1.5" fill="#4F6B3D" opacity="0.35"/>
  <ellipse cx="48" cy="37" rx="5" ry="2" fill="#5D7F4A" opacity="0.4"/>
  <circle cx="35" cy="45" r="1.4" fill="#7BA668" opacity="0.45"/>
  <circle cx="37" cy="43" r="1.2" fill="#8DB474" opacity="0.4"/>
  <circle cx="33" cy="43" r="1.3" fill="#7BA668" opacity="0.38"/>
  <rect x="0" y="26" width="64" height="12" fill="url(#curb_bevel2)"/>
  <rect x="0" y="26" width="64" height="1" fill="#FFFFFF" opacity="0.25"/>
  <rect x="0" y="38" width="64" height="4" fill="#000000" opacity="0.1"/>
  <rect x="0" y="25" width="64" height="2" fill="#2E323A" opacity="0.4"/>
</svg>
