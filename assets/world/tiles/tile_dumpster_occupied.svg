<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0.0 -8.0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="dumpster_body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <ellipse cx="32" cy="44" rx="28" ry="4" fill="#000000" opacity="0.15"/>
  <rect x="4" y="4" width="56" height="36" rx="4" fill="#0F172A" filter="url(#shadow)"/>
  <rect x="6" y="4" width="52" height="34" rx="3" fill="url(#dumpster_body)"/>
  <rect x="8" y="6" width="23" height="12" rx="1" fill="#334155"/>
  <rect x="33" y="6" width="23" height="12" rx="1" fill="#334155"/>
  <rect x="12" y="18" width="2" height="20" fill="#0F172A" opacity="0.5"/>
  <rect x="24" y="18" width="2" height="20" fill="#0F172A" opacity="0.5"/>
  <rect x="40" y="18" width="2" height="20" fill="#0F172A" opacity="0.5"/>
  <rect x="52" y="18" width="2" height="20" fill="#0F172A" opacity="0.5"/>
  <rect x="2" y="20" width="6" height="10" rx="1" fill="#1E293B"/>
  <rect x="56" y="20" width="6" height="10" rx="1" fill="#1E293B"/>
</svg>
