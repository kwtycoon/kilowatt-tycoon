<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="-20.0 0.0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="lamp_pole" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#71717A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#52525B;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <circle cx="12" cy="12" r="10" fill="#FFF9C4" opacity="0.3"/>
  <circle cx="12" cy="12" r="8" fill="#52525B" filter="url(#shadow)"/>
  <circle cx="12" cy="12" r="6" fill="#71717A"/>
  <circle cx="12" cy="12" r="3" fill="#FEF3C7"/>
  <rect x="10" y="18" width="4" height="42" rx="1" fill="url(#lamp_pole)" filter="url(#shadow)"/>
  <rect x="6" y="56" width="12" height="8" rx="2" fill="#52525B"/>
</svg>
