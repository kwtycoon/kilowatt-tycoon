<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#4A3C2A"/>
  <circle cx="20" cy="20" r="12" fill="#16A34A" opacity="0.7"/>
  <circle cx="44" cy="44" r="14" fill="#4ADE80" opacity="0.6"/>
  <circle cx="32" cy="48" r="10" fill="#16A34A" opacity="0.65"/>
  <rect x="0" y="0" width="64" height="4" fill="#E0DCD6" opacity="0.6"/>
  <rect x="0" y="60" width="64" height="4" fill="#E0DCD6" opacity="0.6"/>
</svg>
