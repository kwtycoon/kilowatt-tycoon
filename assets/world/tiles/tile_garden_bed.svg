<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#5D4E37"/>
  <circle cx="16" cy="20" r="6" fill="#EC4899" opacity="0.6"/>
  <circle cx="32" cy="28" r="8" fill="#F59E0B" opacity="0.5"/>
  <circle cx="48" cy="24" r="7" fill="#8B5CF6" opacity="0.6"/>
  <circle cx="20" cy="44" r="6" fill="#EF4444" opacity="0.6"/>
  <circle cx="44" cy="48" r="7" fill="#FBBF24" opacity="0.5"/>
  <circle cx="8" cy="8" r="1" fill="#4A3C2A" opacity="0.4"/>
  <circle cx="56" cy="56" r="1" fill="#4A3C2A" opacity="0.4"/>
</svg>
