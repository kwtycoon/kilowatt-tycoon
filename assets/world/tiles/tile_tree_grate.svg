<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#E0DCD6"/>
  <rect x="8" y="8" width="48" height="48" rx="2" fill="#52525B" filter="url(#shadow)"/>
  <line x1="16" y1="8" x2="16" y2="56" stroke="#71717A" stroke-width="1"/>
  <line x1="8" y1="16" x2="56" y2="16" stroke="#71717A" stroke-width="1"/>
  <line x1="24" y1="8" x2="24" y2="56" stroke="#71717A" stroke-width="1"/>
  <line x1="8" y1="24" x2="56" y2="24" stroke="#71717A" stroke-width="1"/>
  <line x1="32" y1="8" x2="32" y2="56" stroke="#71717A" stroke-width="1"/>
  <line x1="8" y1="32" x2="56" y2="32" stroke="#71717A" stroke-width="1"/>
  <line x1="40" y1="8" x2="40" y2="56" stroke="#71717A" stroke-width="1"/>
  <line x1="8" y1="40" x2="56" y2="40" stroke="#71717A" stroke-width="1"/>
  <line x1="48" y1="8" x2="48" y2="56" stroke="#71717A" stroke-width="1"/>
  <line x1="8" y1="48" x2="56" y2="48" stroke="#71717A" stroke-width="1"/>
  <circle cx="32" cy="32" r="8" fill="#5D4E37"/>
</svg>
