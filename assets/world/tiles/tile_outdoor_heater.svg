<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="-20.0 -8.0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="heater_body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A1A1AA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#52525B;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <ellipse cx="12" cy="46" rx="10" ry="2" fill="#000000" opacity="0.12"/>
  <circle cx="12" cy="44" r="6" fill="#52525B" filter="url(#shadow)"/>
  <rect x="10" y="16" width="4" height="28" rx="1" fill="url(#heater_body)"/>
  <path d="M6 16 L6 6 L18 6 L18 16 Z" fill="#71717A" filter="url(#shadow)"/>
  <rect x="8" y="8" width="8" height="6" rx="1" fill="#FFC107" filter="url(#shadow)"/>
  <circle cx="12" cy="11" r="4" fill="#F44336" opacity="0.3"/>
</svg>
