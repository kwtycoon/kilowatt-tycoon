<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="curb_bevel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4"/>
      <stop offset="30%" style="stop-color:#E8E4DC;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#E8E4DC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.3"/>
    </linearGradient>
    <pattern id="asphalt_curb" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#3A3F4B"/>
      <circle cx="2" cy="3" r="0.6" fill="#2E323A" opacity="0.3"/>
      <circle cx="6" cy="6" r="0.5" fill="#4A5160" opacity="0.2"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="64" height="30" fill="#3A3F4B"/>
  <rect x="0" y="0" width="64" height="30" fill="url(#asphalt_curb)"/>
  <rect x="0" y="34" width="64" height="30" fill="#E0DCD6"/>
  <rect x="0" y="34" width="64" height="30" fill="#F0EDE8" opacity="0.1"/>
  <rect x="0" y="26" width="64" height="12" fill="url(#curb_bevel)"/>
  <rect x="0" y="26" width="64" height="1" fill="#FFFFFF" opacity="0.3"/>
  <rect x="0" y="38" width="64" height="3" fill="#000000" opacity="0.08"/>
  <rect x="0" y="25" width="64" height="2" fill="#2E323A" opacity="0.5"/>
</svg>
