<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="garage_texture" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#3D4451"/>
      <circle cx="2" cy="3" r="0.5" fill="#2E323D" opacity="0.3"/>
      <circle cx="6" cy="6" r="0.4" fill="#4F5663" opacity="0.2"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#3D4451"/>
  <rect x="0" y="0" width="64" height="64" fill="url(#garage_texture)"/>
  <rect x="0" y="0" width="64" height="64" fill="#000000" opacity="0.15"/>
</svg>
