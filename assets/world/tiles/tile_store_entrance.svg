<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="store_floor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0EDE8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E0DCD6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="quickmart_frame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2B6BC0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E4D8C;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="url(#store_floor)"/>
  <rect x="4" y="0" width="56" height="60" fill="url(#quickmart_frame)"/>
  <rect x="8" y="4" width="48" height="52" fill="#B8D4E8" opacity="0.4"/>
  <rect x="8" y="4" width="48" height="52" fill="none" stroke="#1E4D8C" stroke-width="3"/>
  <line x1="32" y1="4" x2="32" y2="56" stroke="#1E4D8C" stroke-width="2"/>
  <path d="M 10 8 L 26 8 L 14 32 Z" fill="#FFFFFF" opacity="0.15"/>
  <rect x="16" y="30" width="10" height="3" rx="1" fill="#A1A1AA"/>
  <rect x="38" y="30" width="10" height="3" rx="1" fill="#A1A1AA"/>
  <rect x="12" y="50" width="40" height="10" rx="2" fill="#3A3F4B" opacity="0.6"/>
</svg>
