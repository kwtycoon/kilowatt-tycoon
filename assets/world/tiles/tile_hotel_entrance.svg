<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="hotel_floor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8DCC7;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#D4C5B0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D4C5B0;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="url(#hotel_floor)"/>
  <line x1="0" y1="20" x2="30" y2="0" stroke="#F0EDE8" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="64" x2="64" y2="30" stroke="#F0EDE8" stroke-width="1" opacity="0.3"/>
  <rect x="16" y="40" width="32" height="16" rx="2" fill="#71717A" opacity="0.2"/>
</svg>
