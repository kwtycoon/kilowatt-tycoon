<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#3A3F4B"/>
  <rect x="0" y="0" width="64" height="64" fill="#10B981" opacity="0.25"/>
  <circle cx="24" cy="32" r="6" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
  <circle cx="40" cy="32" r="6" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
  <line x1="24" y1="26" x2="32" y2="20" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
  <line x1="32" y1="20" x2="40" y2="26" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
</svg>
