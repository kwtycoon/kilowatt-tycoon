<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#3D4451"/>
  <rect x="0" y="0" width="4" height="64" fill="#F59E0B" opacity="0.9"/>
  <rect x="60" y="0" width="4" height="64" fill="#F59E0B" opacity="0.9"/>
  <rect x="0" y="60" width="64" height="4" fill="#F59E0B" opacity="0.9"/>
  <polygon points="32,16 34,24 42,24 36,29 38,37 32,32 26,37 28,29 22,24 30,24" fill="#F59E0B" opacity="0.5"/>
</svg>
