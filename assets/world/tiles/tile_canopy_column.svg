<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="-32.0 0.0 96.0 96.0">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="column_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E0DCD6;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#F0EDE8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E0DCD6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="column_cap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E63950;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C41E3A;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect x="6" y="8" width="20" height="80" rx="2" fill="url(#column_grad)" filter="url(#shadow)"/>
  <rect x="2" y="0" width="28" height="10" rx="2" fill="url(#column_cap)"/>
  <rect x="4" y="2" width="24" height="2" fill="#E63950" opacity="0.5"/>
  <rect x="4" y="8" width="24" height="3" rx="1" fill="#FFE066" opacity="0.7"/>
  <rect x="2" y="88" width="28" height="8" rx="2" fill="#E0DCD6"/>
</svg>
