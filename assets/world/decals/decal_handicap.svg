<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="access_bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#64B5F6;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#2196F3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1"/>
    </radialGradient>
  </defs>
  <circle cx="24" cy="24" r="21" fill="#1976D2" filter="url(#shadow)"/>
  <circle cx="24" cy="24" r="20" fill="url(#access_bg)"/>
  <circle cx="24" cy="24" r="17" fill="none" stroke="#64B5F6" stroke-width="1" opacity="0.3"/>
  <circle cx="24" cy="13" r="4" fill="#FFFFFF"/>
  <rect x="22" y="17" width="4" height="10" rx="1" fill="#FFFFFF"/>
  <rect x="24" y="20" width="8" height="3" rx="1" fill="#FFFFFF"/>
  <circle cx="22" cy="34" r="7" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <path d="M26 27 L30 34 L26 34" fill="#FFFFFF"/>
  <circle cx="32" cy="30" r="2" fill="#FFFFFF"/>
</svg>
