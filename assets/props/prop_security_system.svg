<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="led_glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="pole_shaft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7B8899;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#9CA3AF;stop-opacity:1"/>
      <stop offset="65%" style="stop-color:#6B7280;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4B5563;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="base_top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#9CA3AF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4B5563;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="jbox_body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#4B5563;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="housing_body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#4B5563;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="housing_inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#4B5563;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3D4A5C;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="lens_outer" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#1E3A5F;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#0F1923;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0A0F14;stop-opacity:1"/>
    </radialGradient>
    <radialGradient id="lens_inner" cx="35%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#1E3A5F;stop-opacity:1"/>
    </radialGradient>
    <linearGradient id="arm_metal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7B8899;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#9CA3AF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5A6577;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="visor_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5A6577;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- ===== POLE ===== -->
  <!-- Ground shadow -->
  <ellipse cx="64" cy="116" rx="28" ry="5" fill="#000000" opacity="0.12"/>
  <!-- Base plate bottom (3D bevel) -->
  <ellipse cx="64" cy="112" rx="22" ry="6" fill="#374151"/>
  <!-- Base plate top surface -->
  <ellipse cx="64" cy="110" rx="20" ry="5" fill="url(#base_top)"/>
  <!-- Base plate highlight -->
  <ellipse cx="60" cy="109" rx="12" ry="2.5" fill="#D1D5DB" opacity="0.2"/>
  <!-- Mounting bolts -->
  <circle cx="48" cy="110" r="2.2" fill="#4B5563"/>
  <circle cx="48" cy="110" r="1.4" fill="#6B7280"/>
  <circle cx="80" cy="110" r="2.2" fill="#4B5563"/>
  <circle cx="80" cy="110" r="1.4" fill="#6B7280"/>
  <!-- Pole shaft -->
  <rect x="58" y="56" width="12" height="56" rx="2" fill="url(#pole_shaft)" filter="url(#shadow)"/>
  <!-- Pole highlight strip -->
  <rect x="60" y="56" width="2.5" height="56" rx="1" fill="#D1D5DB" opacity="0.25"/>
  <!-- Junction box (centered on pole) -->
  <rect x="53" y="80" width="22" height="14" rx="2.5" fill="url(#jbox_body)" filter="url(#shadow)"/>
  <rect x="55" y="82" width="18" height="10" rx="2" fill="#4B5563"/>
  <rect x="56" y="82.5" width="16" height="2" rx="0.75" fill="#9CA3AF" opacity="0.3"/>
  <circle cx="68" cy="89" r="2" fill="#4CAF50"/>
  <circle cx="68" cy="89" r="1" fill="#81C784" opacity="0.8"/>
  <!-- Pole cap -->
  <rect x="55" y="55" width="18" height="4" rx="2" fill="#4B5563"/>
  <rect x="56" y="55" width="16" height="2" rx="1" fill="#9CA3AF" opacity="0.3"/>

  <!-- ===== CAMERA ===== -->
  <!-- Camera arm from pole top to housing -->
  <path d="M64 58 L64 46 L48 38" stroke="url(#arm_metal)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>
  <!-- Arm highlight -->
  <path d="M63 57 L63 46 L49 38.5" stroke="#D1D5DB" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>
  <!-- Camera housing -->
  <rect x="16" y="22" width="30" height="22" rx="4" fill="url(#housing_body)" filter="url(#shadow)"/>
  <rect x="18" y="24" width="26" height="18" rx="3" fill="url(#housing_inner)"/>
  <!-- Housing top highlight -->
  <rect x="19" y="24.5" width="24" height="2" rx="0.75" fill="#9CA3AF" opacity="0.25"/>
  <!-- Sun visor -->
  <path d="M16 22 L15 18 L40 18 L38 22" fill="url(#visor_grad)"/>
  <path d="M16 19 L39 19" stroke="#9CA3AF" stroke-width="0.5" opacity="0.3"/>
  <!-- Lens -->
  <circle cx="30" cy="34" r="8" fill="#1A202C"/>
  <circle cx="30" cy="34" r="7" fill="url(#lens_outer)"/>
  <circle cx="30" cy="34" r="5" fill="url(#lens_inner)"/>
  <!-- Lens glint -->
  <circle cx="27.5" cy="31.5" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="31" cy="36" r="0.8" fill="rgba(255,255,255,0.15)"/>
  <!-- Lens rim -->
  <circle cx="30" cy="34" r="7.5" fill="none" stroke="#6B7280" stroke-width="0.6" opacity="0.5"/>
  <!-- IR LEDs -->
  <circle cx="21" cy="27" r="1.5" fill="#E53E3E" opacity="0.7" filter="url(#led_glow)"/>
  <circle cx="21" cy="27" r="1.0" fill="#FC8181" opacity="0.9"/>
  <circle cx="21" cy="41" r="1.5" fill="#E53E3E" opacity="0.7" filter="url(#led_glow)"/>
  <circle cx="21" cy="41" r="1.0" fill="#FC8181" opacity="0.9"/>
  <!-- Recording indicator LED -->
  <circle cx="42" cy="28" r="2.2" fill="#E53E3E" opacity="0.5" filter="url(#led_glow)"/>
  <circle cx="42" cy="28" r="1.3" fill="#FC8181"/>
  <!-- Cable -->
  <path d="M48 38 L48 44 Q48 46 46 46" stroke="#4A5568" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Signal waves -->
  <path d="M72 40 Q78 34 72 28" stroke="#A0AEC0" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M76 42 Q84 34 76 26" stroke="#A0AEC0" stroke-width="1.2" fill="none" opacity="0.35"/>
  <path d="M80 44 Q88 34 80 24" stroke="#A0AEC0" stroke-width="0.8" fill="none" opacity="0.2"/>
</svg>
