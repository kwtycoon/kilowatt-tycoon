<svg xmlns="http://www.w3.org/2000/svg" width="16" height="24" viewBox="0 0 16 24">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="charger_bollard_lit_top" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#34D399;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1"/>
    </radialGradient>
    <radialGradient id="charger_glow_active" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#A7F3D0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#34D399;stop-opacity:0.6"/>
    </radialGradient>
  </defs>
  <circle cx="8" cy="4" r="7" fill="#A7F3D0" opacity="0.25"/>
  <ellipse cx="8" cy="21" rx="6" ry="2" fill="#000000" opacity="0.15"/>
  <rect x="3" y="6" width="10" height="16" rx="2" fill="#059669" filter="url(#shadow)"/>
  <rect x="4" y="7" width="8" height="14" rx="1.5" fill="url(#charger_bollard_lit_top)"/>
  <circle cx="8" cy="4" r="4" fill="url(#charger_glow_active)"/>
  <circle cx="8" cy="4" r="2" fill="#FFFFFF" opacity="0.8"/>
  <rect x="6" y="11" width="4" height="6" rx="0.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="8" cy="13" r="1" fill="#059669"/>
  <rect x="4" y="18" width="8" height="2" rx="0.5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="7" cy="3" r="1" fill="#FFFFFF" opacity="0.7"/>
</svg>
