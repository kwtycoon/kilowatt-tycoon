<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="pole_shaft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7B8899;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#9CA3AF;stop-opacity:1"/>
      <stop offset="65%" style="stop-color:#6B7280;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4B5563;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="base_top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#9CA3AF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4B5563;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="jbox_body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#4B5563;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Ground shadow -->
  <ellipse cx="64" cy="116" rx="28" ry="5" fill="#000000" opacity="0.12"/>
  <!-- Base plate bottom (dark edge for 3D bevel) -->
  <ellipse cx="64" cy="112" rx="22" ry="6" fill="#374151"/>
  <!-- Base plate top surface -->
  <ellipse cx="64" cy="110" rx="20" ry="5" fill="url(#base_top)"/>
  <!-- Base plate highlight -->
  <ellipse cx="60" cy="109" rx="12" ry="2.5" fill="#D1D5DB" opacity="0.2"/>
  <!-- Mounting bolts on base plate -->
  <circle cx="48" cy="110" r="2.2" fill="#4B5563"/>
  <circle cx="48" cy="110" r="1.4" fill="#6B7280"/>
  <circle cx="80" cy="110" r="2.2" fill="#4B5563"/>
  <circle cx="80" cy="110" r="1.4" fill="#6B7280"/>
  <!-- Pole shaft (centered, thick enough to read at small scale) -->
  <rect x="58" y="56" width="12" height="56" rx="2" fill="url(#pole_shaft)" filter="url(#shadow)"/>
  <!-- Pole highlight strip -->
  <rect x="60" y="56" width="2.5" height="56" rx="1" fill="#D1D5DB" opacity="0.25"/>
  <!-- Junction box (centered ON the pole, not offset) -->
  <rect x="53" y="80" width="22" height="14" rx="2.5" fill="url(#jbox_body)" filter="url(#shadow)"/>
  <rect x="55" y="82" width="18" height="10" rx="2" fill="#4B5563"/>
  <!-- Junction box highlight -->
  <rect x="56" y="82.5" width="16" height="2" rx="0.75" fill="#9CA3AF" opacity="0.3"/>
  <!-- Junction box status LED -->
  <circle cx="68" cy="89" r="2" fill="#4CAF50"/>
  <circle cx="68" cy="89" r="1" fill="#81C784" opacity="0.8"/>
  <!-- Pole cap at top (flat mounting bracket) -->
  <rect x="55" y="55" width="18" height="4" rx="2" fill="#4B5563"/>
  <rect x="56" y="55" width="16" height="2" rx="1" fill="#9CA3AF" opacity="0.3"/>
</svg>
