<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="pole_metal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7B8899"/>
      <stop offset="40%" style="stop-color:#9CA3AF"/>
      <stop offset="100%" style="stop-color:#4B5563"/>
    </linearGradient>
    <linearGradient id="antenna_body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Base plate -->
  <rect x="44" y="108" width="40" height="8" rx="2" fill="#4B5563" filter="url(#shadow)"/>
  <rect x="46" y="108" width="36" height="3" rx="1" fill="#6B7280"/>

  <!-- Pole -->
  <rect x="60" y="36" width="8" height="72" rx="2" fill="url(#pole_metal)" filter="url(#shadow)"/>

  <!-- Antenna housing -->
  <rect x="50" y="20" width="28" height="20" rx="4" fill="url(#antenna_body)" filter="url(#shadow)"/>
  <rect x="52" y="22" width="24" height="6" rx="2" fill="#93C5FD" opacity="0.4"/>

  <!-- Antenna tip -->
  <rect x="62" y="8" width="4" height="14" rx="1" fill="#9CA3AF"/>
  <circle cx="64" cy="8" r="3" fill="#60A5FA"/>

  <!-- Signal waves (right) -->
  <path d="M82 28 Q90 22 82 16" stroke="#60A5FA" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M86 32 Q96 22 86 12" stroke="#60A5FA" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M90 36 Q102 22 90 8" stroke="#60A5FA" stroke-width="1" fill="none" opacity="0.25"/>

  <!-- Signal waves (left) -->
  <path d="M46 28 Q38 22 46 16" stroke="#60A5FA" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M42 32 Q32 22 42 12" stroke="#60A5FA" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M38 36 Q26 22 38 8" stroke="#60A5FA" stroke-width="1" fill="none" opacity="0.25"/>

  <!-- Status LED -->
  <circle cx="64" cy="44" r="2.5" fill="#34D399"/>
  <circle cx="64" cy="44" r="4" fill="#34D399" opacity="0.3"/>
</svg>
