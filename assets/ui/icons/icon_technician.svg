<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="icon_shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <circle cx="24" cy="24" r="20" fill="#0284C7" filter="url(#shadow)"/>
  <circle cx="24" cy="24" r="18" fill="#0EA5E9"/>
  <circle cx="24" cy="22" r="8" fill="#E8A857"/>
  <ellipse cx="24" cy="16" rx="10" ry="3" fill="#FBBF24"/>
  <rect x="16" y="10" width="16" height="6" rx="3" fill="#FCD34D" filter="url(#shadow)"/>
  <rect x="18" y="30" width="12" height="8" rx="2" fill="#F97316"/>
</svg>
