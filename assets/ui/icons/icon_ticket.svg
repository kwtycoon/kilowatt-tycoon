<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="icon_shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect x="8" y="4" width="32" height="40" rx="4" fill="#D32F2F" filter="url(#shadow)"/>
  <rect x="10" y="6" width="28" height="36" rx="3" fill="#F44336" filter="url(#shadow)"/>
  <circle cx="8" cy="24" r="4" fill="#1F2937"/>
  <circle cx="40" cy="24" r="4" fill="#1F2937"/>
  <rect x="14" y="12" width="20" height="3" fill="#FFFFFF"/>
  <rect x="14" y="18" width="16" height="2" fill="rgba(255,255,255,0.7)"/>
  <rect x="14" y="23" width="18" height="2" fill="rgba(255,255,255,0.7)"/>
  <text x="24" y="36" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">!</text>
</svg>
