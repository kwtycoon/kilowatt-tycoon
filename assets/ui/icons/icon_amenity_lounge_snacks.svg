<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="couch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle - warm tone -->
  <circle cx="24" cy="24" r="21" fill="#9C7F5C" filter="url(#shadow)"/>
  <circle cx="24" cy="24" r="19" fill="#B8956A"/>
  <circle cx="24" cy="24" r="16" fill="none" stroke="#D4A574" stroke-width="1"/>
  
  <!-- LEFT: Couch symbol -->
  <!-- Couch base -->
  <rect x="6" y="18" width="16" height="10" rx="3" fill="#5B21B6"/>
  <rect x="7" y="19" width="14" height="8" rx="2" fill="url(#couch)"/>
  
  <!-- Cushions -->
  <rect x="8" y="20" width="5" height="6" rx="1" fill="#A78BFA"/>
  <rect x="14" y="20" width="5" height="6" rx="1" fill="#A78BFA"/>
  
  <!-- Armrests -->
  <rect x="6" y="17" width="3" height="12" rx="1.5" fill="#7C3AED"/>
  <rect x="19" y="17" width="3" height="12" rx="1.5" fill="#7C3AED"/>
  
  <!-- Coffee table -->
  <rect x="8" y="30" width="12" height="6" rx="1" fill="#4A3728"/>
  <ellipse cx="14" cy="33" rx="3" ry="2" fill="#E8DDD0"/>
  
  <!-- Divider -->
  <line x1="24" y1="10" x2="24" y2="38" stroke="#9C7F5C" stroke-width="2"/>
  
  <!-- RIGHT: Snack/vending symbol -->
  <!-- Vending machine -->
  <rect x="28" y="12" width="14" height="20" rx="2" fill="#4B5563"/>
  <rect x="29" y="13" width="12" height="18" rx="1" fill="#6B7280"/>
  
  <!-- Display window -->
  <rect x="30" y="14" width="10" height="10" rx="1" fill="#1F2937"/>
  
  <!-- Product rows -->
  <rect x="31" y="15" width="2.5" height="4" rx="0.5" fill="#EF4444"/>
  <rect x="34" y="15" width="2.5" height="4" rx="0.5" fill="#3B82F6"/>
  <rect x="37" y="15" width="2.5" height="4" rx="0.5" fill="#22C55E"/>
  <rect x="31" y="20" width="2.5" height="3" rx="0.5" fill="#F59E0B"/>
  <rect x="34" y="20" width="2.5" height="3" rx="0.5" fill="#EC4899"/>
  <rect x="37" y="20" width="2.5" height="3" rx="0.5" fill="#8B5CF6"/>
  
  <!-- Coin slot -->
  <rect x="31" y="26" width="4" height="3" rx="0.5" fill="#374151"/>
  
  <!-- Status light -->
  <circle cx="38" cy="28" r="2" fill="#4CAF50"/>
  
  <!-- Coffee cup -->
  <ellipse cx="35" cy="37" rx="5" ry="3" fill="#4A3728"/>
  <ellipse cx="35" cy="37" rx="4" ry="2.5" fill="#5D4A35"/>
  <ellipse cx="35" cy="36" rx="3" ry="1.5" fill="#8B4513"/>
  
  <!-- Status indicator -->
  <circle cx="40" cy="40" r="4" fill="#FFC107"/>
  <circle cx="40" cy="40" r="2.5" fill="#FFD54F"/>
  <circle cx="39" cy="39" r="1" fill="#FFFFFF" opacity="0.5"/>
</svg>

