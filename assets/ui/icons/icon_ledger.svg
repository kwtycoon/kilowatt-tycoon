<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="icon_shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Book spine -->
  <rect x="10" y="8" width="4" height="32" rx="1" fill="#FFFFFF" filter="url(#shadow)"/>
  <!-- Book body -->
  <rect x="14" y="8" width="24" height="32" rx="2" fill="#FFFFFF" filter="url(#shadow)"/>
  <!-- Ledger lines -->
  <line x1="18" y1="16" x2="34" y2="16" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="18" y1="22" x2="34" y2="22" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="18" y1="28" x2="34" y2="28" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="18" y1="34" x2="34" y2="34" stroke="#1F2937" stroke-width="1.5"/>
  <!-- Vertical divider for columns -->
  <line x1="27" y1="12" x2="27" y2="38" stroke="#1F2937" stroke-width="1.5"/>
</svg>
