<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="gold_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE066"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#DAA520"/>
    </linearGradient>
    <linearGradient id="ribbon_gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#B45309"/>
    </linearGradient>
  </defs>
  <!-- Ribbon -->
  <polygon points="18,4 24,16 30,4" fill="url(#ribbon_gold)"/>
  <!-- Medal circle -->
  <circle cx="24" cy="28" r="14" fill="url(#gold_grad)" stroke="#B8860B" stroke-width="2"/>
  <!-- Inner circle -->
  <circle cx="24" cy="28" r="10" fill="none" stroke="#DAA520" stroke-width="1.5"/>
  <!-- Number 1 -->
  <text x="24" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#704214">1</text>
</svg>
