<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="icon_shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <circle cx="24" cy="24" r="20" fill="#374151" filter="url(#shadow)"/>
  <circle cx="24" cy="24" r="18" fill="#1F2937"/>
  <circle cx="24" cy="24" r="16" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="24.0" y1="11.0" x2="24.0" y2="9.0" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="30.5" y1="12.7" x2="31.5" y2="11.0" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="35.3" y1="17.5" x2="37.0" y2="16.5" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="37.0" y1="24.0" x2="39.0" y2="24.0" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="35.3" y1="30.5" x2="37.0" y2="31.5" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="30.5" y1="35.3" x2="31.5" y2="37.0" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="24.0" y1="37.0" x2="24.0" y2="39.0" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="17.5" y1="35.3" x2="16.5" y2="37.0" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="12.7" y1="30.5" x2="11.0" y2="31.5" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="11.0" y1="24.0" x2="9.0" y2="24.0" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="12.7" y1="17.5" x2="11.0" y2="16.5" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="17.5" y1="12.7" x2="16.5" y2="11.0" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="24" y1="24" x2="24" y2="16" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="30" y2="20" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <circle cx="24" cy="24" r="2" fill="#FFFFFF"/>
