<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="icon_shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <circle cx="24" cy="24" r="20" fill="#0284C7" filter="url(#shadow)"/>
  <circle cx="24" cy="24" r="18" fill="#0EA5E9"/>
  <circle cx="20" cy="20" r="5" fill="#FFFFFF"/>
  <rect x="16" y="26" width="8" height="10" rx="2" fill="#FFFFFF"/>
  <path d="M26 24 L36 24" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <path d="M32 20 L36 24 L32 28" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
