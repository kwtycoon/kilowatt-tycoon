<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="icon_shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect x="6" y="4" width="36" height="40" rx="6" fill="#374151" filter="url(#shadow)"/>
  <rect x="8" y="6" width="32" height="36" rx="4" fill="#1F2937" filter="url(#shadow)"/>
  <rect x="20" y="10" width="8" height="24" rx="3" fill="#4B5563" filter="url(#shadow)"/>
  <rect x="21" y="12" width="6" height="18" rx="2" fill="#F44336" filter="url(#shadow)"/>
  <circle cx="24" cy="36" r="6" fill="#F44336"/>
  <line x1="29" y1="14" x2="32" y2="14" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="29" y1="19" x2="32" y2="19" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="29" y1="24" x2="32" y2="24" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="29" y1="29" x2="32" y2="29" stroke="#9CA3AF" stroke-width="1"/>
</svg>
