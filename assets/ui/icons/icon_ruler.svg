<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="icon_shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect x="16" y="6" width="16" height="36" rx="2" stroke="#FFFFFF" stroke-width="2" fill="none"/>
  <line x1="16" y1="14" x2="24" y2="14" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="16" y1="22" x2="28" y2="22" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="16" y1="30" x2="24" y2="30" stroke="#FFFFFF" stroke-width="2"/>
</svg>
