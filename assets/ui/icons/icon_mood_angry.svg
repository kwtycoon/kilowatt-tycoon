<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="face_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCA5A5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Face circle -->
  <circle cx="12" cy="12" r="10" fill="url(#face_bg)" stroke="#DC2626" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Left eye -->
  <circle cx="8" cy="10" r="1.5" fill="#1F2937"/>
  <!-- Right eye -->
  <circle cx="16" cy="10" r="1.5" fill="#1F2937"/>
  <!-- Angry eyebrows -->
  <line x1="5" y1="8" x2="10" y2="6" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="8" x2="14" y2="6" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
  <!-- Angry mouth (frown) -->
  <path d="M7 17 Q12 13 17 17" stroke="#1F2937" stroke-width="2" stroke-linecap="round" fill="none"/>
</svg>
