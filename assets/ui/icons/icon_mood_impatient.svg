<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="face_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE68A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Face circle -->
  <circle cx="12" cy="12" r="10" fill="url(#face_bg)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Left eye -->
  <circle cx="8" cy="10" r="1.5" fill="#1F2937"/>
  <!-- Right eye -->
  <circle cx="16" cy="10" r="1.5" fill="#1F2937"/>
  <!-- Worried eyebrows -->
  <line x1="6" y1="7" x2="10" y2="8" stroke="#1F2937" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="7" x2="14" y2="8" stroke="#1F2937" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Worried mouth (slight frown) -->
  <path d="M8 16 Q12 14 16 16" stroke="#1F2937" stroke-width="2" stroke-linecap="round" fill="none"/>
</svg>
