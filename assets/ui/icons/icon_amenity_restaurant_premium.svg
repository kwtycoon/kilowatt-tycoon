<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#F59E0B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="screen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1"/>
    </radialGradient>
  </defs>
  
  <!-- Background circle - premium dark -->
  <circle cx="24" cy="24" r="21" fill="#1F2937" filter="url(#shadow)"/>
  <circle cx="24" cy="24" r="19" fill="#374151"/>
  <circle cx="24" cy="24" r="17" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  
  <!-- LEFT: Dining symbol (fork and knife) -->
  <!-- Fork -->
  <rect x="8" y="10" width="2" height="18" rx="1" fill="#E5E7EB"/>
  <rect x="7" y="10" width="1" height="6" fill="#E5E7EB"/>
  <rect x="8.5" y="10" width="1" height="6" fill="#E5E7EB"/>
  <rect x="10" y="10" width="1" height="6" fill="#E5E7EB"/>
  
  <!-- Knife -->
  <rect x="14" y="10" width="2" height="18" rx="1" fill="#E5E7EB"/>
  <path d="M 14 10 L 16 10 L 17 16 L 14 16 Z" fill="#9CA3AF"/>
  
  <!-- Plate -->
  <ellipse cx="12" cy="34" rx="8" ry="5" fill="#E5E7EB"/>
  <ellipse cx="12" cy="34" rx="6" ry="3.5" fill="#F3F4F6"/>
  <ellipse cx="12" cy="34" rx="4" ry="2" fill="#E5E7EB"/>
  
  <!-- Divider -->
  <line x1="24" y1="8" x2="24" y2="40" stroke="#4B5563" stroke-width="2"/>
  
  <!-- RIGHT: Entertainment symbol (TV/gaming) -->
  <!-- TV Screen -->
  <rect x="28" y="10" width="16" height="12" rx="2" fill="#111827"/>
  <rect x="29" y="11" width="14" height="10" rx="1" fill="url(#screen)"/>
  <!-- Screen stand -->
  <rect x="33" y="22" width="6" height="2" fill="#4B5563"/>
  <rect x="31" y="24" width="10" height="2" rx="1" fill="#6B7280"/>
  
  <!-- Game controller -->
  <rect x="30" y="30" width="12" height="7" rx="3" fill="#4B5563"/>
  <rect x="31" y="31" width="10" height="5" rx="2" fill="#6B7280"/>
  <!-- Controller buttons -->
  <circle cx="34" cy="33.5" r="1" fill="#374151"/>
  <circle cx="38" cy="33" r="1" fill="#EF4444"/>
  <circle cx="40" cy="34" r="1" fill="#22C55E"/>
  <!-- D-pad -->
  <rect x="32" y="32.5" width="1" height="3" fill="#374151"/>
  <rect x="31" y="33.5" width="3" height="1" fill="#374151"/>
  
  <!-- Star rating indicator -->
  <polygon points="36,40 37,42 39,42 37.5,43.5 38,45.5 36,44 34,45.5 34.5,43.5 33,42 35,42" fill="#FCD34D"/>
  
  <!-- Premium status indicator -->
  <circle cx="40" cy="40" r="4" fill="url(#gold)"/>
  <circle cx="40" cy="40" r="2.5" fill="#FCD34D"/>
  <circle cx="39" cy="39" r="1" fill="#FFFFFF" opacity="0.6"/>
</svg>

