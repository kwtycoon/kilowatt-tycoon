<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="icon_shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <circle cx="24" cy="24" r="20" fill="#388E3C" filter="url(#shadow)"/>
  <circle cx="24" cy="24" r="18" fill="#4CAF50"/>
  <circle cx="24" cy="24" r="14" fill="none" stroke="#81C784" stroke-width="2"/>
  <text x="24" y="25" font-family="Arial, sans-serif" font-size="22" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">$</text>
  <ellipse cx="18" cy="18" rx="4" ry="6" fill="#FFFFFF" opacity="0.25" transform="rotate(-30 18 18)"/>
</svg>
