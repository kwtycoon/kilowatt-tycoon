<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="icon_shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <circle cx="24" cy="24" r="12" fill="#F9A825" filter="url(#shadow)"/>
  <circle cx="24" cy="24" r="10" fill="#FFC107"/>
  <line x1="24.0" y1="10.0" x2="24.0" y2="4.0" stroke="#FFC107" stroke-width="3" stroke-linecap="round"/>
  <line x1="33.9" y1="14.1" x2="38.1" y2="9.9" stroke="#FFC107" stroke-width="3" stroke-linecap="round"/>
  <line x1="38.0" y1="24.0" x2="44.0" y2="24.0" stroke="#FFC107" stroke-width="3" stroke-linecap="round"/>
  <line x1="33.9" y1="33.9" x2="38.1" y2="38.1" stroke="#FFC107" stroke-width="3" stroke-linecap="round"/>
  <line x1="24.0" y1="38.0" x2="24.0" y2="44.0" stroke="#FFC107" stroke-width="3" stroke-linecap="round"/>
  <line x1="14.1" y1="33.9" x2="9.9" y2="38.1" stroke="#FFC107" stroke-width="3" stroke-linecap="round"/>
  <line x1="10.0" y1="24.0" x2="4.0" y2="24.0" stroke="#FFC107" stroke-width="3" stroke-linecap="round"/>
  <line x1="14.1" y1="14.1" x2="9.9" y2="9.9" stroke="#FFC107" stroke-width="3" stroke-linecap="round"/>
</svg>
