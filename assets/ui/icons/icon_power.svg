<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="icon_shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <circle cx="24" cy="24" r="20" fill="#F9A825" filter="url(#shadow)"/>
  <circle cx="24" cy="24" r="18" fill="#FFC107"/>
  <circle cx="24" cy="24" r="14" fill="none" stroke="#FFD54F" stroke-width="2" stroke-dasharray="4 2"/>
  <path d="M27 10 L19 23 L25 23 L21 38 L31 25 L25 25 Z" fill="#FFFFFF"/>
</svg>
