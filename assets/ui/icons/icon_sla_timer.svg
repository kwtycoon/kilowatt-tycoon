<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="icon_shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <circle cx="24" cy="24" r="20" fill="#D32F2F" filter="url(#shadow)"/>
  <circle cx="24" cy="24" r="18" fill="#F44336"/>
  <circle cx="24" cy="24" r="14" fill="#1F2937"/>
  <line x1="24" y1="24" x2="24" y2="14" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="32" y2="26" stroke="#F44336" stroke-width="3" stroke-linecap="round"/>
  <circle cx="24" cy="24" r="2" fill="#FFFFFF"/>
  <circle cx="24" cy="24" r="14" fill="none" stroke="#E57373" stroke-width="2" stroke-dasharray="8 4" opacity="0.7"/>
</svg>
