  <circle cx="24" cy="24" r="19" fill="#6B7280"/>
  <circle cx="24" cy="24" r="16" fill="none" stroke="#9CA3AF" stroke-width="1"/>
  
  <!-- WiFi symbol (left side) -->
  <!-- WiFi dot -->
  <circle cx="15" cy="30" r="2.5" fill="#2196F3"/>
  <circle cx="15" cy="30" r="1.5" fill="#64B5F6"/>
  
  <!-- WiFi arcs -->
