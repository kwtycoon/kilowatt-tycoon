  <path d="M 4 18 A 14 14 0 0 1 26 18" fill="none" stroke="#2196F3" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Divider line -->
  <line x1="24" y1="10" x2="24" y2="38" stroke="#4B5563" stroke-width="2"/>
  
  <!-- Restroom symbol (right side) -->
  <!-- Person figure -->
