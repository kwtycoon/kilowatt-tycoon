<svg xmlns="http://www.w3.org/2000/svg" width="64" height="32" viewBox="0 0 64 32">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="tooltip_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1F2937;stop-opacity:1"/>
    </linearGradient>
    <filter id="tooltip_shadow" x="-15%" y="-15%" width="130%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect x="2" y="2" width="60" height="26" rx="6" fill="url(#tooltip_grad)" filter="url(#tooltip_shadow)"/>
  <rect x="2" y="2" width="60" height="26" rx="6" fill="none" stroke="#374151" stroke-width="1"/>
  <rect x="8" y="3" width="48" height="1" rx="0.5" fill="#FFFFFF" opacity="0.1"/>
  <path d="M28 28 L32 32 L36 28" fill="url(#tooltip_grad)"/>
  <path d="M28 28 L32 32 L36 28" fill="none" stroke="#374151" stroke-width="1"/>
  <rect x="4" y="4" width="56" height="22" rx="4" fill="#FFFFFF" opacity="0.02"/>
</svg>
