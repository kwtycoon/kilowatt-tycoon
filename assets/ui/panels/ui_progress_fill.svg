<svg xmlns="http://www.w3.org/2000/svg" width="128" height="16" viewBox="0 0 128 16">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
        <linearGradient id="prog_fill_grad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#81C784;stop-opacity:1"/>
          <stop offset="50%" style="stop-color:#4CAF50;stop-opacity:1"/>
          <stop offset="100%" style="stop-color:#388E3C;stop-opacity:1"/>
        </linearGradient>
        <linearGradient id="prog_shine" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
          <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0.1"/>
          <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
        </linearGradient>
  </defs>
  <rect x="2" y="2" width="124" height="12" rx="6" fill="url(#prog_fill_grad)"/>
  <rect x="2" y="2" width="124" height="6" rx="3" fill="url(#prog_shine)"/>
  <defs>
    <pattern id="prog_stripes" patternUnits="userSpaceOnUse" width="20" height="16">
      <rect x="0" y="0" width="20" height="16" fill="transparent"/>
      <path d="M-5 16 L15 0 L20 0 L0 16 Z" fill="#FFFFFF" opacity="0.1"/>
    </pattern>
  </defs>
  <rect x="2" y="2" width="124" height="12" rx="6" fill="url(#prog_stripes)"/>
  <rect x="122" y="4" width="2" height="8" rx="1" fill="#81C784" opacity="0.6"/>
</svg>
