<svg xmlns="http://www.w3.org/2000/svg" width="128" height="16" viewBox="0 0 128 16">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
        <linearGradient id="prog_bg_grad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#1A202C;stop-opacity:1"/>
          <stop offset="100%" style="stop-color:#1F2937;stop-opacity:1"/>
        </linearGradient>
  </defs>
  <rect x="0" y="0" width="128" height="16" rx="8" fill="url(#prog_bg_grad)"/>
  <rect x="1" y="1" width="126" height="14" rx="7" fill="#000000" opacity="0.3"/>
  <rect x="2" y="2" width="124" height="12" rx="6" fill="#1F2937"/>
  <rect x="4" y="3" width="120" height="2" rx="1" fill="#FFFFFF" opacity="0.05"/>
  <rect x="32" y="5" width="1" height="6" fill="#374151" opacity="0.2"/>
  <rect x="64" y="5" width="1" height="6" fill="#374151" opacity="0.2"/>
  <rect x="96" y="5" width="1" height="6" fill="#374151" opacity="0.2"/>
</svg>
