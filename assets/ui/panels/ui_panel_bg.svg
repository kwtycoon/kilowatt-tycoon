<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="panel_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1F2937;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="panel_inner_glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.08"/>
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
    <filter id="panel_shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="10" fill="#1F2937" filter="url(#panel_shadow)"/>
  <rect x="2" y="2" width="60" height="60" rx="10" fill="url(#panel_grad)"/>
  <rect x="4" y="4" width="56" height="56" rx="8" fill="url(#panel_inner_glow)"/>
  <rect x="2" y="2" width="60" height="60" rx="10" fill="none" stroke="#374151" stroke-width="1.5"/>
  <path d="M12 3 L52 3" stroke="#FFFFFF" stroke-width="1" opacity="0.1" stroke-linecap="round"/>
  <rect x="6" y="6" width="52" height="52" rx="6" fill="none" stroke="#374151" stroke-width="0.5" opacity="0.3"/>
  <circle cx="8" cy="8" r="1.5" fill="#374151" opacity="0.4"/>
  <circle cx="56" cy="8" r="1.5" fill="#374151" opacity="0.4"/>
  <circle cx="8" cy="56" r="1.5" fill="#374151" opacity="0.3"/>
  <circle cx="56" cy="56" r="1.5" fill="#374151" opacity="0.3"/>
</svg>
