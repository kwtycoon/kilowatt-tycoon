<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="driver_shirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="emotion_aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FDE047;stop-opacity:0.6"/>
      <stop offset="70%" style="stop-color:#EAB308;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#EAB308;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <circle cx="16" cy="16" r="15" fill="url(#emotion_aura)"/>
  <ellipse cx="16" cy="29" rx="8" ry="2" fill="#000000" opacity="0.15"/>
  <rect x="10" y="18" width="12" height="10" rx="3" fill="url(#driver_shirt)" filter="url(#shadow)"/>
  <rect x="6" y="20" width="4" height="5" rx="1" fill="#E8A857"/>
  <rect x="22" y="20" width="4" height="5" rx="1" fill="#E8A857"/>
  <circle cx="16" cy="11" r="7" fill="#E8A857" filter="url(#shadow)"/>
  <ellipse cx="16" cy="7" rx="6" ry="3" fill="#4A3728"/>
  <rect x="10" y="5" width="12" height="4" rx="2" fill="#4A3728"/>
  <circle cx="13" cy="10" r="1.5" fill="#1F2937"/>
  <circle cx="19" cy="10" r="1.5" fill="#1F2937"/>
  <circle cx="13.5" cy="9.5" r="0.5" fill="#FFFFFF"/>
  <circle cx="19.5" cy="9.5" r="0.5" fill="#FFFFFF"/>
  <line x1="13" y1="14" x2="19" y2="14" stroke="#1F2937" stroke-width="1.5"/>
  <text x="24" y="6" font-family="Arial" font-size="7" fill="#EAB308">...</text>
</svg>
