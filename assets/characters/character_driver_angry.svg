<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="driver_shirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="emotion_aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FCA5A5;stop-opacity:0.6"/>
      <stop offset="70%" style="stop-color:#EF4444;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <circle cx="16" cy="16" r="15" fill="url(#emotion_aura)"/>
  <ellipse cx="16" cy="29" rx="8" ry="2" fill="#000000" opacity="0.15"/>
  <rect x="10" y="18" width="12" height="10" rx="3" fill="url(#driver_shirt)" filter="url(#shadow)"/>
  <rect x="5" y="19" width="5" height="6" rx="2" fill="#E8A857"/>
  <rect x="22" y="19" width="5" height="6" rx="2" fill="#E8A857"/>
  <circle cx="16" cy="11" r="7" fill="#E8A857" filter="url(#shadow)"/>
  <ellipse cx="16" cy="7" rx="6" ry="3" fill="#4A3728"/>
  <rect x="10" y="5" width="12" height="4" rx="2" fill="#4A3728"/>
  <ellipse cx="13" cy="10" rx="1.5" ry="1" fill="#1F2937"/>
  <ellipse cx="19" cy="10" rx="1.5" ry="1" fill="#1F2937"/>
  <line x1="11" y1="8" x2="14" y2="9" stroke="#4A3728" stroke-width="1.5"/>
  <line x1="21" y1="8" x2="18" y2="9" stroke="#4A3728" stroke-width="1.5"/>
  <path d="M13 15 Q16 13 19 15" stroke="#1F2937" stroke-width="1.5" fill="none"/>
  <text x="24" y="7" font-family="Arial" font-size="8" fill="#EF4444">!</text>
  <text x="27" y="5" font-family="Arial" font-size="6" fill="#EF4444">!</text>
</svg>
