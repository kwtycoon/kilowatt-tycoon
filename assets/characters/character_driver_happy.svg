<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="driver_shirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="emotion_aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#86EFAC;stop-opacity:0.6"/>
      <stop offset="70%" style="stop-color:#22C55E;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22C55E;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <circle cx="16" cy="16" r="15" fill="url(#emotion_aura)"/>
  <ellipse cx="16" cy="29" rx="8" ry="2" fill="#000000" opacity="0.15"/>
  <rect x="10" y="18" width="12" height="10" rx="3" fill="url(#driver_shirt)" filter="url(#shadow)"/>
  <rect x="4" y="16" width="5" height="6" rx="2" fill="#E8A857" transform="rotate(-20 6 19)"/>
  <rect x="23" y="16" width="5" height="6" rx="2" fill="#E8A857" transform="rotate(20 26 19)"/>
  <circle cx="16" cy="11" r="7" fill="#E8A857" filter="url(#shadow)"/>
  <ellipse cx="16" cy="7" rx="6" ry="3" fill="#4A3728"/>
  <rect x="10" y="5" width="12" height="4" rx="2" fill="#4A3728"/>
  <path d="M11.5 10 Q13 9 14.5 10" stroke="#1F2937" stroke-width="1.5" fill="none"/>
  <path d="M17.5 10 Q19 9 20.5 10" stroke="#1F2937" stroke-width="1.5" fill="none"/>
  <path d="M13 14 Q16 17 19 14" stroke="#1F2937" stroke-width="1.5" fill="none"/>
  <text x="26" y="6" font-family="Arial" font-size="6" fill="#22C55E">✓</text>
</svg>
