<svg xmlns="http://www.w3.org/2000/svg" width="144" height="32" viewBox="0 0 144 32">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="money_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#388E3C;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="money_shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <g transform="translate(0, 4)" opacity="0.7">
  <rect x="8" y="8" width="32" height="20" rx="6" fill="#388E3C" filter="url(#shadow)"/>
  <rect x="9" y="8" width="30" height="18" rx="5" fill="url(#money_bg)"/>
    <rect x="10" y="9" width="28" height="4" rx="2" fill="url(#money_shine)"/>
  <text x="24" y="18" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">+$</text>
  </g>
  <g transform="translate(48, 0)">
  <rect x="6" y="4" width="36" height="24" rx="8" fill="#388E3C" filter="url(#shadow)"/>
  <rect x="7" y="4" width="34" height="22" rx="7" fill="url(#money_bg)"/>
    <rect x="8" y="5" width="32" height="5" rx="2" fill="url(#money_shine)"/>
  <text x="24" y="16" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">+$</text>
    <circle cx="38" cy="8" r="2" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="10" cy="22" r="1.5" fill="#FFFFFF" opacity="0.6"/>
  </g>
  <g transform="translate(96, -4)" opacity="0.5">
  <rect x="4" y="2" width="40" height="26" rx="10" fill="#4CAF50"/>
  <text x="24" y="16" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">+$</text>
    <rect x="10" y="24" width="28" height="6" rx="3" fill="#4CAF50" opacity="0.3"/>
  </g>
</svg>
