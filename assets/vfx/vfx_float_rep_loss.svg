<svg xmlns="http://www.w3.org/2000/svg" width="144" height="32" viewBox="0 0 144 32">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="rep_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F44336;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D32F2F;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <g transform="translate(-2, 4)" opacity="0.8">
  <rect x="8" y="6" width="32" height="20" rx="6" fill="#D32F2F" filter="url(#shadow)"/>
  <rect x="9" y="6" width="30" height="18" rx="5" fill="url(#rep_bg)"/>
  <text x="24" y="16" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">-★</text>
  </g>
  <g transform="translate(52, 2)">
  <rect x="6" y="4" width="36" height="24" rx="8" fill="#D32F2F" filter="url(#shadow)"/>
  <rect x="7" y="4" width="34" height="22" rx="7" fill="url(#rep_bg)"/>
  <text x="24" y="15" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">-★</text>
    <line x1="28" y1="10" x2="32" y2="18" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
    <line x1="18" y1="12" x2="22" y2="20" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
  </g>
  <g transform="translate(96, -2)" opacity="0.4">
  <rect x="4" y="2" width="40" height="26" rx="10" fill="#F44336"/>
  <text x="24" y="16" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle" dominant-baseline="middle">-★</text>
    <path d="M24 26 L24 32" stroke="#F44336" stroke-width="4" opacity="0.3"/>
  </g>
</svg>
