<svg xmlns="http://www.w3.org/2000/svg" width="64" height="16" viewBox="0 0 64 16">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="pulse_glow_green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#A5D6A7;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#4CAF50;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#388E3C;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <circle cx="8" cy="8" r="6" fill="url(#pulse_glow_green)" opacity="0.3"/>
  <circle cx="8" cy="8" r="3" fill="#388E3C"/>
  <circle cx="8" cy="8" r="2" fill="#4CAF50" opacity="0.5"/>
  <circle cx="24" cy="8" r="7" fill="url(#pulse_glow_green)" opacity="0.5"/>
  <circle cx="24" cy="8" r="4" fill="#4CAF50"/>
  <circle cx="24" cy="8" r="2" fill="#81C784" opacity="0.7"/>
  <circle cx="40" cy="8" r="8" fill="url(#pulse_glow_green)" opacity="0.7" filter="url(#glow)"/>
  <circle cx="40" cy="8" r="4" fill="#4CAF50"/>
  <circle cx="40" cy="8" r="2" fill="#81C784"/>
  <circle cx="56" cy="8" r="8" fill="url(#pulse_glow_green)" filter="url(#glow)"/>
  <circle cx="56" cy="8" r="5" fill="#81C784"/>
  <circle cx="56" cy="8" r="3" fill="#FFFFFF"/>
  <circle cx="55" cy="7" r="1" fill="#FFFFFF"/>
</svg>
