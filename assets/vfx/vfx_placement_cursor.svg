<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cursor_glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64B5F6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#2196F3;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <rect x="6" y="6" width="52" height="52" rx="4" fill="url(#cursor_glow)" opacity="0.2"/>
  <path d="M4 18 L4 4 L18 4" stroke="#2196F3" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M46 4 L60 4 L60 18" stroke="#2196F3" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M60 46 L60 60 L46 60" stroke="#2196F3" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M18 60 L4 60 L4 46" stroke="#2196F3" stroke-width="3" fill="none" stroke-linecap="round"/>
  <rect x="4" y="4" width="56" height="56" rx="4" fill="none" stroke="#64B5F6" stroke-width="1" stroke-dasharray="8 4" opacity="0.5"/>
</svg>
