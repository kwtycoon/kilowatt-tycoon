<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="l2body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9CA3AF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4B5563;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="l2glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#9CA3AF;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#6B7280;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4B5563;stop-opacity:0.8"/>
    </radialGradient>
  </defs>
  <rect x="20" y="54" width="24" height="8" rx="3" fill="#4B5563" filter="url(#shadow)"/>
  <rect x="14" y="6" width="36" height="50" rx="6" fill="#4B5563" filter="url(#shadow)"/>
  <rect x="16" y="4" width="32" height="50" rx="5" fill="url(#l2body)"/>
  <rect x="18" y="6" width="28" height="3" rx="1" fill="#D1D5DB" opacity="0.6"/>
  <rect x="20" y="12" width="24" height="16" rx="3" fill="#4B5563"/>
  <rect x="22" y="14" width="20" height="12" rx="2" fill="#1F2937"/>
  <rect x="25" y="19" width="14" height="2" fill="#81C784"/>
  <rect x="24" y="32" width="16" height="14" rx="3" fill="#4B5563"/>
  <rect x="26" y="34" width="12" height="10" rx="2" fill="#111827"/>
  <circle cx="32" cy="38" r="4" fill="#9CA3AF"/>
  <circle cx="32" cy="38" r="2" fill="#111827"/>
  <rect x="46" y="28" width="6" height="20" rx="2" fill="#4B5563"/>
  <path d="M49 30 Q52 38 49 46" stroke="#6B7280" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="32" cy="8" r="6" fill="url(#l2glow)" filter="url(#glow)"/>
