<svg xmlns="http://www.w3.org/2000/svg" width="64" height="128" viewBox="0 0 64 128">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="screenbody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#4B5563;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="screenface" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1F2937;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Base/stand -->
  <rect x="12" y="116" width="40" height="10" rx="4" fill="#4B5563" filter="url(#shadow)"/>
  <rect x="14" y="118" width="36" height="2" rx="1" fill="#6B7280" opacity="0.5"/>
  <!-- Pole connecting base to screen panel -->
  <rect x="26" y="20" width="12" height="98" rx="3" fill="#4B5563"/>
  <rect x="28" y="22" width="8" height="94" rx="2" fill="#6B7280" opacity="0.4"/>
  <!-- Outer screen housing -->
  <rect x="4" y="2" width="56" height="80" rx="6" fill="#4B5563" filter="url(#shadow)"/>
  <rect x="6" y="4" width="52" height="76" rx="5" fill="url(#screenbody)"/>
  <!-- Screen bezel -->
  <rect x="8" y="6" width="48" height="72" rx="4" fill="#374151"/>
  <!-- Screen face (the dark display area) -->
  <rect x="10" y="8" width="44" height="68" rx="3" fill="url(#screenface)"/>
  <!-- Screen reflection highlight -->
  <rect x="12" y="10" width="20" height="30" rx="2" fill="#1F2937" opacity="0.3"/>
  <!-- Power indicator LED at bottom of panel (dim) -->
  <circle cx="32" cy="86" r="2" fill="#4B5563"/>
  <circle cx="32" cy="86" r="1.2" fill="#6B7280"/>
</svg>
