name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate-manifest:
    name: Validate Asset Manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate asset manifest
        run: python tools/validate_manifest.py

  check-asset-build:
    name: Check Asset Build is Valid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Inkscape (for SVG→PNG conversion)
        run: |
          sudo apt-get update
          sudo apt-get install -y inkscape

      - name: Run asset build
        run: python tools/build_assets.py --skip-existing

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code || (
            echo "❌ Generated asset files are out of date!"
            echo ""
            echo "The following files have uncommitted changes after build:"
            git diff --name-only
            echo ""
            echo "Please run 'python3 tools/build_assets.py' locally and commit changes."
            exit 1
          )


  rust-checks:
    name: Rust Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            libasound2-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libwayland-dev
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: native
          cache-targets: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Run clippy
        run: cargo clippy --all-targets --all-features --no-deps -- -D warnings

      - name: Check compilation
        run: cargo check --all-targets --all-features

      - name: Run tests
        run: cargo test --all-features


  wasm-check:
    name: WASM Compilation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
          cache-targets: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
      
      - name: Check WASM compilation
        run: cargo check --target wasm32-unknown-unknown


  wasm-browser-tests:
    name: WASM Browser Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
          cache-targets: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Run wasm-bindgen-test in headless Chrome
        run: wasm-pack test --headless --chrome


  e2e-mobile:
    name: Playwright Mobile E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
          cache-targets: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache Trunk tools
        uses: actions/cache@v4
        with:
          path: ~/.cache/trunk
          key: trunk-tools-${{ runner.os }}

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.1
        with:
          version: 'v0.21.14'

      - name: Build WASM
        run: trunk build

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright dependencies
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Serve dist and run Playwright tests
        working-directory: tests/e2e
        run: |
          npx serve ../../dist -l 8080 &
          npx playwright test
        env:
          BASE_URL: http://127.0.0.1:8080

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 14
